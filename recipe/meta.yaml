{% set name = "infomap" %}
{% set python_min = "3.11" %}
{% set version = "2.10.1" %}

package:
  name: infomap
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/infomap-{{ version }}.tar.gz
  sha256: 35c553afef376315e6466baf5f78f626942e312c9042f583749b606bd74c7ac9

build:
  skip: true  # [win]
  entry_points:
    - infomap = infomap:main
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  build:
    - {{ stdlib("c") }}
    - {{ compiler("cxx") }}
    - libgomp  # [linux]
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
  host:
    - python {{ python_min }}.*
    - setuptools >=68
    - wheel
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - infomap
    - package_meta
  commands:
    - pip check
    - infomap --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://mapequation.github.io
  license: GPL-3.0-or-later
  license_family: GPL
  license_file: LICENSE
  summary: Multi-level network clustering based on the Map Equation
  description: |
    Multi-level network clustering based on the Map Equation.
  doc_url: https://mapequation.github.io/infomap/python/
  dev_url: https://github.com/mapequation/infomap

extra:
  recipe-maintainers:
    - apcamargo
    - vinisalazar
