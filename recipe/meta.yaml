{% set name = "infomap" %}
{% set version = "2.13.0" %}

package:
  name: infomap
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/infomap-{{ version }}.tar.gz
  sha256: e15d2d5541208018cb22ed413c938009de87683537e8a96e8f7f7caba17feb9b

build:
  number: 0
  skip: true  # [win or py<311]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - {{ stdlib("c") }}
    - {{ compiler("cxx") }}
    - libgomp  # [linux]
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
  host:
    - python
    - pip
    - setuptools >=68
    - wheel
    - llvm-openmp  # [osx]
  run:
    - python

test:
  imports:
    - infomap
  commands:
    - pip check
    - infomap --help
  requires:
    - pip

about:
  home: https://mapequation.github.io
  license: GPL-3.0-or-later
  license_family: GPL
  license_file: LICENSE_GPLv3.txt
  summary: Multi-level network clustering based on the Map Equation
  description: |
    Multi-level network clustering based on the Map Equation.
  doc_url: https://mapequation.github.io/infomap/python/
  dev_url: https://github.com/mapequation/infomap

extra:
  recipe-maintainers:
    - apcamargo
    - vinisalazar
    - antoneri
